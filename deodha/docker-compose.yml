version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deodha-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=deodha_user
      - DB_PASSWORD=secure_password_123
      - DB_NAME=deodha_db
      - JWT_SECRET=your_jwt_secret_key_change_in_production
      - RAZORPAY_KEY_ID=your_razorpay_key_id
      - RAZORPAY_KEY_SECRET=your_razorpay_key_secret
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./public:/app/public
      - ./logs:/app/logs
    networks:
      - deodha-network

  mysql:
    image: mysql:8.0
    container_name: deodha-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root_password_123
      - MYSQL_DATABASE=deodha_db
      - MYSQL_USER=deodha_user
      - MYSQL_PASSWORD=secure_password_123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - deodha-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  nginx:
    image: nginx:alpine
    container_name: deodha-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - deodha-network

volumes:
  mysql_data:

networks:
  deodha-network:
    driver: bridge
